name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: node
          cache: ''

      - name: Show npm version
        run: npm -v

      - name: Install dependencies
        run: npm ci

      - name: Show outdated dependencies
        run: npm outdated

      - name: Show outdated dependencies with shorter min-release-age
        run: npm outdated --min-release-age=7

      - name: Update 'which' package
        run: |
          npm install 'which@latest'
          git diff
